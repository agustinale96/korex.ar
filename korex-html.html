].map(c => ({
  ...c,
  displayName: c.sub ? `${c.name} – ${c.sub}` : c.name,
  setName: SET_NAMES[c.s],
  imageUrl: cardImg(c.s, c.n),
}));

function searchCatalog(q) {
  const t = q.toLowerCase().trim();
  return CATALOG.filter(c =>
    c.name.toLowerCase().includes(t) || (c.sub && c.sub.toLowerCase().includes(t))
  ).slice(0, 12);
}

function Placeholder({ name, set }) {
  const initials = (name||"").split(" ").filter(w => /^[A-Z\u00C0-\u024F]/.test(w)).map(w=>w[0]).join("").slice(0,3);
  const color = SET_COLORS[set] || "#1a3a50";
  return React.createElement("div", {
    style:{width:"100%",height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"0.5rem",background:`linear-gradient(160deg,${color}33,#0a1220)`}
  },
    React.createElement("div", {style:{fontSize:"2rem",fontFamily:"Rajdhani,sans-serif",fontWeight:700,color:`${color}bb`,letterSpacing:"2px"}}, initials||"◈"),
    React.createElement("div", {style:{fontSize:"0.55rem",fontFamily:"Rajdhani,sans-serif",color:`${color}77`,letterSpacing:"3px",textTransform:"uppercase"}}, set)
  );
}

function CardImg({ url, name, set }) {
  const [ok, setOk] = useState(false);
  const [err, setErr] = useState(false);
  return React.createElement("div", {style:{width:"100%",height:"100%",position:"relative"}},
    !ok && React.createElement(Placeholder, {name, set}),
    !err && React.createElement("img", {
      src: url, alt: name,
      className: "cimg",
      style:{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",display:ok?"block":"none"},
      onLoad: () => setOk(true),
      onError: () => setErr(true)
    })
  );
}

function AcThumb({ url, name, set }) {
  const [ok, setOk] = useState(false);
  const [err, setErr] = useState(false);
  const color = SET_COLORS[set] || "#1a3a50";
  const initials = (name||"").split(" ").filter(w=>/^[A-Z]/.test(w)).map(w=>w[0]).join("").slice(0,2);
  return React.createElement("div", {
    style:{width:36,height:50,flexShrink:0,borderRadius:4,overflow:"hidden",border:"1px solid rgba(0,180,255,.15)",background:`linear-gradient(160deg,${color}44,#0d1626)`,display:"flex",alignItems:"center",justifyContent:"center",color:`${color}cc`,fontSize:".72rem",fontFamily:"Rajdhani,sans-serif",fontWeight:700,position:"relative"}
  },
    !ok && React.createElement("span", null, err ? initials : initials),
    !err && React.createElement("img", {
      src: url, alt: name,
      style:{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",display:ok?"block":"none"},
      onLoad: ()=>setOk(true), onError: ()=>setErr(true)
    })
  );
}

function App() {
  const [viewMode, setViewMode] = useState("owner");
  const [collection, setCollection] = useState(() => {
    try { return JSON.parse(localStorage.getItem("korex_collection") || "[]"); } catch { return []; }
  });
  const [filterQ, setFilterQ] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [showShare, setShowShare] = useState(false);
  const [editCard, setEditCard] = useState(null);
  const [cardQ, setCardQ] = useState("");
  const [acList, setAcList] = useState([]);
  const [selected, setSelected] = useState(null);
  const [price, setPrice] = useState("");
  const [editPrice, setEditPrice] = useState("");
  const [copied, setCopied] = useState(false);
  const [toast, setToast] = useState(null);
  const acRef = useRef(null);

  useEffect(() => {
    try { localStorage.setItem("korex_collection", JSON.stringify(collection)); } catch {}
  }, [collection]);

  useEffect(() => {
    const h = e => { if (acRef.current && !acRef.current.contains(e.target)) setAcList([]); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);

  const handleCardQ = v => {
    setCardQ(v); setSelected(null);
    setAcList(v.trim().length >= 2 ? searchCatalog(v) : []);
  };
  const selectCard = c => { setSelected(c); setCardQ(c.displayName); setAcList([]); };

  const showToast = msg => { setToast(msg); setTimeout(() => setToast(null), 3100); };

  const addCard = () => {
    if (!selected || !price) return;
    const entry = { uid: Date.now().toString(), card_id: selected.id, name: selected.displayName, setCode: selected.s, type: selected.t, imageUrl: selected.imageUrl, price: parseFloat(price).toFixed(2) };
    setCollection(p => [entry, ...p]);
    setShowAdd(false); setSelected(null); setCardQ(""); setPrice(""); setAcList([]);
    showToast("✦ Carta agregada");
  };

  const removeCard = uid => { setCollection(p => p.filter(c => c.uid !== uid)); showToast("Carta eliminada"); };
  const openEdit = c => { setEditCard(c); setEditPrice(c.price); };
  const saveEdit = () => {
    setCollection(p => p.map(c => c.uid === editCard.uid ? {...c, price: parseFloat(editPrice).toFixed(2)} : c));
    setEditCard(null); showToast("Precio actualizado");
  };
  const copyLink = () => {
    const link = `${SHARE_BASE}${USERNAME}`;
    navigator.clipboard?.writeText("https://" + link).catch(()=>{});
    setCopied(true); setTimeout(() => setCopied(false), 2000);
    showToast("¡Enlace copiado!");
  };

  const filtered = collection.filter(c => c.name.toLowerCase().includes(filterQ.toLowerCase()));
  const totalValue = collection.reduce((s, c) => s + parseFloat(c.price || 0), 0);
  const shareLink = `${SHARE_BASE}${USERNAME}`;

  const h = React.createElement;

  return h("div", {className:"root"},
    h("div", {className:"scanline"}),
    h("div", {className:"ctlt"}), h("div", {className:"ctrt"}),

    // HEADER
    h("header", {className:"header"},
      h("div", {className:"logo"}, "KOR", h("span", null, "EX")),
      h("div", {className:"hright"},
        viewMode === "viewer"
          ? h(React.Fragment, null,
              h("div", {className:"vbadge"}, h("div",{className:"dot"}), " Vista pública"),
              h("button", {className:"addbtn", style:{fontSize:".8rem",padding:".35rem .9rem"}, onClick:()=>setViewMode("owner")}, "← Volver")
            )
          : h(React.Fragment, null,
              h("span", {className:"ubadge"}, "⬡ " + USERNAME),
              h("button", {className:"sharebtn", onClick:()=>setShowShare(true)}, "⟁ Compartir Carpeta"),
              h("button", {className:"vbadge", style:{cursor:"pointer",background:"none"}, onClick:()=>setViewMode("viewer")}, "👁 Vista pública")
            )
      )
    ),

    // MAIN
    h("main", {className:"main"},
      h("div", {className:"topbar"},
        h("div", {className:"swrap"},
          h("span", {className:"sicon"}, "⌕"),
          h("input", {className:"sinput", placeholder:"Buscar en mi carpeta...", value:filterQ, onChange:e=>setFilterQ(e.target.value)})
        ),
        viewMode === "owner" && h("button", {className:"addbtn", onClick:()=>setShowAdd(true)}, "+ Agregar Carta")
      ),

      h("div", {className:"statsbar"},
        h("div", {className:"stat"}, "Cartas ", h("span",{className:"statv"}, collection.length)),
        h("div", {className:"stat"}, "Valor total ", h("span",{className:"statv"}, "$" + totalValue.toFixed(2))),
        h("div", {className:"stat"}, "Carpeta de ", h("span",{className:"statv"}, "@" + USERNAME))
      ),

      h("div", {className:"grid"},
        filtered.length === 0
          ? h("div", {className:"empty"},
              h("div",{className:"eicon"},"◈"),
              h("div",{className:"etitle"}, collection.length===0 ? "Carpeta vacía" : "Sin resultados"),
              h("div",{className:"esub"}, collection.length===0
                ? (viewMode==="owner" ? "Agrega cartas con el botón de arriba" : "Este usuario no tiene cartas")
                : `Sin coincidencias para "${filterQ}"`)
            )
          : filtered.map(card =>
              h("div", {key:card.uid, className:"tile"},
                h("div", {className:"imgwrap"},
                  h(CardImg, {url:card.imageUrl, name:card.name, set:card.setCode}),
                  viewMode==="owner" && h("div", {className:"overlay"},
                    h("button", {className:"abtn ebtn", onClick:()=>openEdit(card)}, "✎ Editar"),
                    h("button", {className:"abtn dbtn", onClick:()=>removeCard(card.uid)}, "✕ Quitar")
                  )
                ),
                h("div", {className:"cinfo"},
                  h("div", {className:"cname"}, card.name),
                  h("div", {style:{display:"flex",alignItems:"center",gap:".3rem",flexWrap:"wrap"}},
                    h("span", {className:"pbadge"}, "$ " + card.price),
                    h("span", {className:"setbadge"}, card.setCode)
                  )
                )
              )
            )
      )
    ),

    // ADD MODAL
    showAdd && h("div", {className:"backdrop", onClick:e=>{if(e.target===e.currentTarget){setShowAdd(false);setSelected(null);setCardQ("");setPrice("");setAcList([]);}}},
      h("div", {className:"modal"},
        h("div", {className:"mtitle"}, "✦ Agregar Carta"),
        h("div", {className:"fgroup"},
          h("label", {className:"flabel"}, "Buscar carta"),
          h("div", {className:"acwrap", ref:acRef},
            h("input", {className:"finput", placeholder:"Ej: Vader, Luke, Anakin, Ahsoka...", value:cardQ, onChange:e=>handleCardQ(e.target.value), autoFocus:true}),
            cardQ.length >= 2 && h("div", {className:"aclist"},
              acList.length === 0
                ? h("div", {className:"acstatus"}, `Sin resultados para "${cardQ}"`)
                : acList.map((c,i) =>
                    h("div", {key:i, className:"acitem", onClick:()=>selectCard(c)},
                      h(AcThumb, {url:c.imageUrl, name:c.name, set:c.s}),
                      h("div", {style:{flex:1,minWidth:0}},
                        h("div", {className:"acname"}, c.displayName),
                        h("div", {className:"acsub"}, c.setName + " · " + c.t)
                      )
                    )
                  )
            )
          )
        ),
        selected && h("div", {className:"selpreview"},
          h("div", {className:"selthumb"}, h(AcThumb, {url:selected.imageUrl, name:selected.name, set:selected.s})),
          h("div", null,
            h("div", {className:"selname"}, selected.displayName),
            h("div", {className:"selsub"}, selected.setName + " · " + selected.t),
            h("div", {className:"selid"}, "ID: " + selected.id)
          )
        ),
        h("div", {className:"fgroup"},
          h("label", {className:"flabel"}, "Precio"),
          h("div", {className:"piwrap"},
            h("span", {className:"pisym"}, "$"),
            h("input", {className:"finput", type:"number", placeholder:"0.00", min:"0", step:"0.01", value:price, onChange:e=>setPrice(e.target.value), disabled:!selected, style:{paddingLeft:"1.8rem"}})
          )
        ),
        h("div", {className:"mactions"},
          h("button", {className:"bcancl", onClick:()=>{setShowAdd(false);setSelected(null);setCardQ("");setPrice("");setAcList([]);}}, "Cancelar"),
          h("button", {className:"bconf", onClick:addCard, disabled:!selected||!price}, "Agregar a carpeta")
        )
      )
    ),

    // EDIT MODAL
    editCard && h("div", {className:"backdrop", onClick:e=>{if(e.target===e.currentTarget)setEditCard(null)}},
      h("div", {className:"modal"},
        h("div", {className:"mtitle"}, "✎ Editar Precio"),
        h("div", {className:"selpreview"},
          h("div", {className:"selthumb"}, h(AcThumb, {url:editCard.imageUrl, name:editCard.name, set:editCard.setCode})),
          h("div", null,
            h("div", {className:"selname"}, editCard.name),
            h("div", {className:"selid"}, "ID: " + editCard.card_id)
          )
        ),
        h("div", {className:"fgroup"},
          h("label", {className:"flabel"}, "Nuevo precio"),
          h("div", {className:"piwrap"},
            h("span", {className:"pisym"}, "$"),
            h("input", {className:"finput", type:"number", placeholder:"0.00", min:"0", step:"0.01", value:editPrice, onChange:e=>setEditPrice(e.target.value), autoFocus:true, style:{paddingLeft:"1.8rem"}})
          )
        ),
        h("div", {className:"mactions"},
          h("button", {className:"bcancl", onClick:()=>setEditCard(null)}, "Cancelar"),
          h("button", {className:"bconf", onClick:saveEdit, disabled:!editPrice}, "Guardar")
        )
      )
    ),

    // SHARE MODAL
    showShare && h("div", {className:"backdrop", onClick:e=>{if(e.target===e.currentTarget)setShowShare(false)}},
      h("div", {className:"modal"},
        h("div", {className:"mtitle"}, "⟁ Compartir Carpeta"),
        h("p", {style:{fontSize:".9rem",color:"#4d7a9a",marginBottom:".5rem"}}, "Cualquier persona con este enlace podrá ver tu carpeta."),
        h("div", {className:"slinkbox"},
          h("span", {className:"slinktext"}, shareLink),
          h("button", {className:"copybtn" + (copied?" cp":""), onClick:copyLink}, copied ? "✓ Copiado" : "Copiar")
        ),
        h("p", {className:"snote"}, "Los visitantes solo podrán ", h("strong",{style:{color:"#7aa8c4"}},"ver y buscar"), " cartas."),
        h("div", {className:"mactions"}, h("button", {className:"bconf", onClick:()=>setShowShare(false)}, "Listo"))
      )
    ),

    toast && h("div", {className:"toast", key:toast}, toast)
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
